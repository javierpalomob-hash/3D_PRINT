<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Top face -->
  <polygon points="50,8 92,32 50,54 8,32" fill="#5DADE2"/>
  <!-- Top face inner grid lines -->
  <line x1="50" y1="8" x2="50" y2="54" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="29" y1="20" x2="71" y2="43" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="71" y1="20" x2="29" y2="43" stroke="white" stroke-width="2" opacity="0.6"/>
  <!-- Left face -->
  <polygon points="8,32 50,54 50,92 8,70" fill="#154360"/>
  <!-- Right face -->
  <polygon points="92,32 50,54 50,92 92,70" fill="#1F618D"/>
  <!-- Outline edges -->
  <polyline points="50,8 92,32 92,70 50,92 8,70 8,32 50,8" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="50" y1="54" x2="50" y2="92" stroke="white" stroke-width="1.5" opacity="0.4"/>
</svg>
